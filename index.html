<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ESI Web3 Studio — Official Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ESI Web3 Studio — Blockchain development, smart contracts, token launch, and Web3 branding.">
  <style>
    :root {
      --bg: #050509;
      --bg-alt: #0b0b12;
      --card: #11111b;
      --accent: #5b8cff;
      --accent-soft: rgba(91,140,255,0.15);
      --text-main: #ffffff;
      --text-muted: #a0a0b5;
      --border-soft: #1f2233;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #151530 0, #050509 55%);
      color: var(--text-main);
    }

    header {
      padding: 32px 20px 10px;
      border-bottom: 1px solid var(--border-soft);
      background: linear-gradient(to bottom, rgba(5,5,15,0.95), rgba(5,5,15,0.85));
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .nav {
      max-width: 1080px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: radial-gradient(circle at 30% 20%, #5b8cff, #1b1b30);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .brand-text-title {
      font-weight: 600;
      letter-spacing: 0.04em;
      font-size: 15px;
      text-transform: uppercase;
    }

    .brand-text-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .nav-links {
      display: flex;
      gap: 18px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .nav-links a {
      color: inherit;
      text-decoration: none;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
    }

    .nav-links a:hover {
      color: var(--text-main);
      border-bottom-color: var(--accent);
    }

    .pill {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text-muted);
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }
